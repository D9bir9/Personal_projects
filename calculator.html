<!DOCTYPE html>
<html>
  <head>
    <title>Calculator</title>
    <link rel="stylesheet" href="styles/calculator-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="calc-body">
      <div class="calculator">
        <div class="screen">
          <div class="screen-input">
            <input id="js-screen-input" type="text">
          </div>
          <div class="screen-result">
            4
          </div>
        </div>
        <div class="keys">
          <div class="input-keys">
            <div class="general-keys">
              <div class="delete-key">
                <button>AC/C</button>
              </div>
              <div>
                <button>+/-</button>
              </div>
              <div>
                <button>%</button>
              </div>
            </div>
            <div class="number-keys">
              <div class="num-row">
                <div>
                  <button onclick="
                    addElement(7);
                    ">7</button>
                </div>
                <div>
                  <button onclick="
                    addElement(8);
                    ">8</button>
                </div>
                <div>
                  <button onclick="
                    addElement(9);
                    ">9</button>
                </div>
              </div>
              <div class="num-row">
                <div class="">
                  <button onclick="
                    addElement(4);
                    ">4</button>
                </div>
                <div>
                  <button onclick="
                    addElement(5);
                    ">5</button>
                </div>
                <div>
                  <button onclick="
                    addElement(6);
                    ">6</button>
                </div>
              </div>
              <div class="num-row">
                <div>
                  <button onclick="
                    addElement(1);
                    ">1</button>
                </div>
                <div>
                  <button onclick="
                    addElement(2);
                    ">2</button>
                </div>
                <div>
                  <button onclick="
                    addElement(3);
                    ">3</button>
                </div>
              </div>
              <div class="last-row">
                <div class="zero">
                  <button onclick="
                    addElement(0);
                    ">0</button>
                </div>
                <div class="dot">
                  <button onclick="
                    addElement('.');
                    ">.</button>
                </div>
              </div>
            </div>

          </div>
          <div class="operator-keys">
            <div>
              <button>&#247;</button>
            </div>
            <div>
              <button>&#215;</button>
            </div>
            <div>
              <button>&#8722;</button>
            </div>
            <div>
              <button>&#x2b;</button>
            </div>
            <div>
              <button>&#x3D;</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      function addElement(elem){
        document.getElementById("js-screen-input").value += elem;
      }
    </script>
  </body>
</html>
