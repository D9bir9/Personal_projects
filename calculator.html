<!DOCTYPE html>
<html>
  <head>
    <title>Calculator</title>
    <style>

      .calculator{
        display: flex;
        flex-direction: column;
        background-color: black;
        width: 400px;
        height: 550px;
        padding: 20px 10px;
      }

      .screen{
        height: 100px;
        background-color: white;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 5px 10px;
      }
      .screen-input{
        flex: 1;
        margin-bottom: 10px;
        background-color: red;
        display: flex;
        align-items: center;
      }
      .screen-result{
        flex: 1;
        background-color: blue;
        display: flex;
        align-items: center;
      }

      .keys{
        background-color: orange;
        flex: 1;
        margin-top: 30px;
        display: flex;
        justify-content: space-between;
      }

      .operator-keys{
        background-color: pink;
        flex: 0.25;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .operator-keys div{
        flex: 1;
        display: flex;
        align-items: center;
        
      }
      .input-keys{
        background-color: aqua;
        flex: 0.75;
        display: flex;
        flex-direction: column;
      }

      .general-keys{
        flex: 1;
        background-color: yellow;
        display: flex;
        align-items: center;
      }
      .general-keys div{
        flex: 1;
        display: flex;
        justify-content: center;
      }
      .number-keys{
        flex: 4;
        background-color: blueviolet;
        display: flex;
        flex-direction: column;

      }
      .num-row{
        display: flex;
        background-color: gray;
        flex: 1;
        align-items: center;
      }
      .num-row div{
        flex: 1;
        display: flex;
        justify-content: center;
      }

      .last-row{
        flex: 1;
        display: flex;
        align-items: center;
      }

      .zero{
        flex: 2;
        display: flex;
        justify-content: center;
      }
      .dot{
        flex: 1;
        display: flex;
        justify-content: center;
      }

      .general-keys button{
        padding: 20px 20px;
        border-radius: 40px;
        border: none;
      }
      .number-keys button{
        padding: 20px 25px;
        border-radius: 40px;
        border: none;
      }
      .operator-keys button{
        padding: 20px 25px;
        border-radius: 40px;
        border: none;
      }
      .zero button{
        padding-left: 75px;
        padding-right: 75px;
      }

    </style>
  </head>
  <body>

    <div class="calculator">
      <div class="screen">
        <div class="screen-input">
          input
        </div>
        <div class="screen-result">
          result
        </div>
      </div>
      <div class="keys">
        <div class="input-keys">
          <div class="general-keys">
            <div>
              <button>AC</button>
            </div>
            <div>
              <button>+/-</button>
            </div>
            <div>
              <button>%</button>
            </div>
          </div>
          <div class="number-keys">
            <div class="num-row">
              <div>
                <button>7</button>
              </div>
              <div>
                <button>8</button>
              </div>
              <div>
                <button>9</button>
              </div>
            </div>
            <div class="num-row">
              <div class="">
                <button>4</button>
              </div>
              <div>
                <button>5</button>
              </div>
              <div>
                <button>6</button>
              </div>
            </div>
            <div class="num-row">
              <div>
                <button>1</button>
              </div>
              <div>
                <button>2</button>
              </div>
              <div>
                <button>3</button>
              </div>
            </div>
            <div class="last-row">
              <div class="zero">
                <button>0</button>
              </div>
              <div class="dot">
                <button>.</button>
              </div>
            </div>
          </div>

        </div>
        <div class="operator-keys">
          <div>
            <button>&#247;</button>
          </div>
          <div>
            <button>&#215;</button>
          </div>
          <div>
            <button>&#8722;</button>
          </div>
          <div>
            <button>&#x2b;</button>
          </div>
          <div>
            <button>&#x3D;</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      
    </script>
  </body>
</html>
