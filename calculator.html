<!DOCTYPE html>
<html>
  <head>
    <title>Calculator</title>
    <link rel="stylesheet" href="styles/calculator-style.css">
  </head>
  <body>

    <div class="calculator">
      <div class="screen">
        <div class="screen-input">
          2+2
        </div>
        <div class="screen-result">
          4
        </div>
      </div>
      <div class="keys">
        <div class="input-keys">
          <div class="general-keys">
            <div>
              <button>AC</button>
            </div>
            <div>
              <button>+/-</button>
            </div>
            <div>
              <button>%</button>
            </div>
          </div>
          <div class="number-keys">
            <div class="num-row">
              <div>
                <button>7</button>
              </div>
              <div>
                <button>8</button>
              </div>
              <div>
                <button>9</button>
              </div>
            </div>
            <div class="num-row">
              <div class="">
                <button>4</button>
              </div>
              <div>
                <button>5</button>
              </div>
              <div>
                <button>6</button>
              </div>
            </div>
            <div class="num-row">
              <div>
                <button>1</button>
              </div>
              <div>
                <button>2</button>
              </div>
              <div>
                <button>3</button>
              </div>
            </div>
            <div class="last-row">
              <div class="zero">
                <button>0</button>
              </div>
              <div class="dot">
                <button>.</button>
              </div>
            </div>
          </div>

        </div>
        <div class="operator-keys">
          <div>
            <button>&#247;</button>
          </div>
          <div>
            <button>&#215;</button>
          </div>
          <div>
            <button>&#8722;</button>
          </div>
          <div>
            <button>&#x2b;</button>
          </div>
          <div>
            <button>&#x3D;</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      
    </script>
  </body>
</html>
