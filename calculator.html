<!DOCTYPE html>
<html>
  <head>
    <title>Calculator</title>
    <link rel="stylesheet" href="styles/calculator-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
     <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
  </head>
  <body>
    <div class="calc-body">
      <div class="calculator">
        <div class="screen">
          <div class="screen-input">
            <input id="js-screen-input" type="text">
          </div>
          <div id="js-screen-result" class="screen-result">
            
          </div>
        </div>
        <div class="keys">
          <div class="input-keys">
            <div class="general-keys">
              <div class="delete-key">
                <button onclick="
                  delAll();
                  ">AC</button>
              </div>
              <div class="invert-key">
                <button onclick="
                  del();
                  ">C</button>
              </div>
              <div class="bracket-keys">
                <button onclick="
                    addElement('&#40;');
                    ">&#40;</button>
                <button onclick="
                    addElement('&#41;');
                    ">&#41;</button>
              </div>
            </div>
            <div class="number-keys">
              <div class="num-row">
                <div>
                  <button onclick="
                    addElement(7);
                    ">7</button>
                </div>
                <div>
                  <button onclick="
                    addElement(8);
                    ">8</button>
                </div>
                <div>
                  <button onclick="
                    addElement(9);
                    ">9</button>
                </div>
              </div>
              <div class="num-row">
                <div class="">
                  <button onclick="
                    addElement(4);
                    ">4</button>
                </div>
                <div>
                  <button onclick="
                    addElement(5);
                    ">5</button>
                </div>
                <div>
                  <button onclick="
                    addElement(6);
                    ">6</button>
                </div>
              </div>
              <div class="num-row">
                <div>
                  <button onclick="
                    addElement(1);
                    ">1</button>
                </div>
                <div>
                  <button onclick="
                    addElement(2);
                    ">2</button>
                </div>
                <div>
                  <button onclick="
                    addElement(3);
                    ">3</button>
                </div>
              </div>
              <div class="last-row">
                <div class="zero">
                  <button onclick="
                    addElement(0);
                    ">0</button>
                </div>
                <div class="dot">
                  <button onclick="
                    addElement('.');
                    ">.</button>
                </div>
              </div>
            </div>

          </div>
          <div class="operator-keys">
            <div>
              <button onclick="
                    addElement('&#247;');
                    ">&#247;</button>
            </div>
            <div>
              <button onclick="
                    addElement('&#215;');
                    ">&#215;</button>
            </div>
            <div>
              <button onclick="
                    addElement('&#8722;');
                    ">&#8722;</button>
            </div>
            <div>
              <button onclick="
                    addElement('&#x2b;');
                    ">&#x2b;</button>
            </div>
            <div>
              <button onclick="
                    calculate();
                    ">&#x3D;</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      function addElement(elem){
        document.getElementById("js-screen-input").value += elem;
      }
      function calculate(){
        let expression = document.getElementById('js-screen-input').value;
        expression = expression.replace(/&#215;|×/g,'*');
        expression = expression.replace(/&#247;|÷/g,'/');
        try{
          // const result = math.evaluate(expression);
          const result = Function(`return ${expression}`);
          let resultValue = result();
          if (String(resultValue).length > 13){
            resultValue = resultValue.toExponential(5);
          }
          document.getElementById("js-screen-result").innerText = resultValue;
        } catch (error){
          document.getElementById("js-screen-result").innerText = error.message;
        }
         
      }

      function addCommas(number){
        let [intergerPart, decimalPart] = number.toString().split(".");
        intergerPart = intergerPart.replace(/\B(?=(\d{3})+(?!\d))/g, ",");

        return Number(decimalPart?`${intergerPart}.${decimalPart}`: intergerPart);
      }

      function del(){
        let input = document.getElementById('js-screen-input');
        input.value= input.value.substr(0, input.value.length - 1);
      }

      function delAll(){
        document.getElementById('js-screen-input').value = '';
        document.getElementById('js-screen-result').innerText = '';
      }
    </script>
  </body>
</html>
