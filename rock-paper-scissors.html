<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
    <style>
      .game{
        background-color: black;
        color: white;
        padding:20px;
        display: flex;
        flex-direction: column;
        width: 500px;
        height: 300px;
        justify-content: space-between;
        border-radius: 10px;
        border: 4px solid white;
        box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.5);
      }
      .play{
        display: flex;
        align-items: center;
        background-color: black;
        margin-bottom: 30px;

      }

      .play button{
        flex: 1;
        font-size: 30px;
        border: 2px solid white;
        border-radius: 35px;
        padding: 10px;
        margin-right: 10px;
        background-color: black;
        cursor: pointer;

      }

      .results{
        display: flex;
        flex-direction: column;
      }

      .results .reset{
        margin-top: 20px;
      }

      .results .reset button{
        padding: 10px 15px;
        border: 2px solid white;
        color: white;
        background-color: rgb(215, 218, 42);
        border-radius: 8px;
        margin-right: 20px;
        cursor: pointer;
      }

      .screen{
        flex: 1;
        background-color: black;
        border: 2px solid white;
        margin-bottom: 30px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-left: 20px;
        padding-right: 10px;
      }

      .screen .displays {
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .screen .displays div{
        margin-bottom: 5px;
      }

      .screen .history .btn button{
        border: 2px solid white;
        background-color: rgb(215, 218, 42);
        color: white;
        cursor: pointer;
      }

      .screen .history{
        display: flex;
      }
      .screen .history .index{
        margin-right: 5px;
      }

    </style>
  </head>
  <body>
    <div class="game">
      <div class="play">
        <button onclick="
          playerMove.human = moves[0];
          play();
          ">✊</button>
        <button onclick="
          playerMove.human = moves[1];
          play();
          ">🖐️</button>
        <button onclick="
          playerMove.human = moves[2];
          play();
          ">✌️</button>
     </div>

    <div class="screen">
      <div class="displays">
        <div id="result"></div>

        <div id="moves"></div>
      </div>
      <div class="history">
        <div class="index">
          <span id="current_index"> </span>|<span id="total_index"> </span>
        </div>
        <div class="btn">
        <button onclick="
          back();
          showIndex();
          ">&#60;</button>
        <button onclick="
        next();
        showIndex();
        ">&#62;</button>
      </div>
      </div>
      
    </div>

      <div class="results">
        <div>
          Wins: <span id="wins"></span> | Losses: <span id="losses"></span> | Ties <span id="ties"></span>
        </div>
        <div class="reset">
        <button onclick="
          reset();
          results();
          showIndex();
          ">Reset Score</button>

          <button>Move history</button>
      </div>
      </div>
    </div>
    
    <script>
      const moves = ['✊', '🖐️', '✌️'];
      const playerMove = {
        human: '',
        computer: ''
      };
      const gameHistory = JSON.parse(localStorage.getItem('gameHistory')) || {
        result_list: [],
        move_list: []
      };


      const score = JSON.parse(localStorage.getItem('score')) || {
        win: 0,
        losses: 0,
        tie: 0
      };

      const history_tracker = JSON.parse(localStorage.getItem('historyTracker')) || {
        list_length: 0,
        tot_index: 0,
        cur_index: 0,
        len_index:0
      };


      function play(){
        playerMove.computer = pickComputerMove();
        let result = checkGameRules();
        showResult(result);
        addResultToList(result)
        setStaticValues();
        results();
        showIndex();
      }

      function pickComputerMove(){
        return moves[Math.floor(Math.random()*moves.length)];
      }

      function checkGameRules(){
        let result;
        if (playerMove.human === playerMove.computer){
          result = 'Tied';
          score.tie++;
        }
        else if ((playerMove.human === moves[0] && playerMove.computer === moves[2]) || (playerMove.human === moves[1] && playerMove.computer === moves[0]) || (playerMove.human === moves[2] && playerMove.computer === moves[1])){
          result = 'You won!!!';
          score.win++;
        }
        else{
          result = 'You Lost';
          score.losses++;
        }

        return result;
      }

      function addResultToList(result){
        gameHistory.result_list.push(result);
        gameHistory.move_list.push(`You ${playerMove.human} ${playerMove.computer} Computer`);
      }

      function showResult(value){
        document.getElementById("result").innerHTML = value;
        document.getElementById("moves").innerHTML = `You ${playerMove.human} ${playerMove.computer} Computer`;
      }

      function setStaticValues  (){
        localStorage.setItem('score', JSON.stringify(score));
        localStorage.setItem('historyTracker', JSON.stringify(history_tracker));
        localStorage.setItem('gameHistory', JSON.stringify(gameHistory));
        history_tracker.list_length = history_tracker.cur_index = history_tracker.tot_index = gameHistory.result_list.length;
      }

      function results(){
        document.getElementById("wins").innerHTML = score.win;
        document.getElementById("losses").innerHTML = score.losses;
        document.getElementById("ties").innerHTML = score.tie;
      }

      function showIndex(){
        document.getElementById("current_index").innerHTML = history_tracker.cur_index;
        document.getElementById("total_index").innerHTML = history_tracker.tot_index;
      }

      function reset(){
        score.win = score.losses = score.tie = 0;
        localStorage.removeItem('score');
        localStorage.removeItem('historyTracker');
        localStorage.removeItem('gameHistory');
        document.getElementById("result").innerHTML = '';
        document.getElementById("moves").innerHTML = '';
        history_tracker.cur_index = '';
        history_tracker.tot_index = '';
        gameHistory.result_list = [];
        gameHistory.move_list = [];
      }

      function back(){
        history_tracker.len_index = history_tracker.list_length-1;
        if (history_tracker.list_length-1 > 0){
          document.getElementById('result').innerHTML = gameHistory.result_list[history_tracker.len_index-1];
          document.getElementById("moves").innerHTML = gameHistory.move_list[history_tracker.len_index-1];
          history_tracker.list_length--;
          history_tracker.cur_index--
        }  
      }

      function next(){
        history_tracker.len_index = history_tracker.list_length-1;
        if (history_tracker.list_length < gameHistory.result_list.length){
          document.getElementById('result').innerHTML = gameHistory.result_list[history_tracker.len_index+1];
          document.getElementById("moves").innerHTML = gameHistory.move_list[history_tracker.len_index+1];
          history_tracker.list_length++;
          history_tracker.cur_index++
        }  
      }
    </script> 
  </body>
</html>
