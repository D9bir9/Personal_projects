<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles/rock-paper-scissors.css">
    <link rel="stylesheet" href="styles/shared.css">
    <script src="scripts/rock-paper-scissors.js"></script>
  </head>
  <body>
    <div class="game">
      <div class="play">
        <button onclick="
          playerMove.human = moves[0];
          play();
          ">✊</button>
        <button onclick="
          playerMove.human = moves[1];
          play();
          ">🖐️</button>
        <button onclick="
          playerMove.human = moves[2];
          play();
          ">✌️</button>
     </div>

    <div class="screen">
      <div class="displays">
        <div id="result"></div>

        <div id="moves"></div>
      </div>
      <div class="history">
        <div class="index">
          <span id="current_index"> </span>|<span id="total_index"> </span>
        </div>
        <div class="btn">
        <button onclick="
          back();
          showIndex();
          ">&#60;</button>
        <button onclick="
        next();
        showIndex();
        ">&#62;</button>
      </div>
      </div>
      
    </div>

      <div class="results">
        <div>
          Wins: <span id="wins"></span> | Losses: <span id="losses"></span> | Ties <span id="ties"></span>
        </div>
        <div class="reset">
          <button onclick="
            reset();
            results();
            showIndex();
            ">Reset Score</button>
          <button id="js-autoPlay-btn" onclick="
            autoPlay();
          ">
            Auto Play
          </button>
      </div>
      </div>
    </div>
    <div class="link-container">
      <div class="link">
        <a href="index.html">Calculator</a>
      </div>
      <div class="link">
        <a href="todo-list.html">todo-list</a>
      </div>
    </div>
  </body>
</html>
