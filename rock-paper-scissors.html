<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles/rock-paper-scissors.css">
    <link rel="stylesheet" href="styles/shared.css">
  </head>
  <body>
    <div class="game">
      <div class="play">
        <button id="js-rock-button">✊</button>
        <button id="js-paper-button">🖐️</button>
        <button id="js-scissors-button">✌️</button>
     </div>

    <div class="screen">
      <div class="displays">
        <div id="result"></div>

        <div id="moves"></div>
      </div>
      <div class="history">
        <div class="index">
          <span id="current_index"> </span>|<span id="total_index"> </span>
        </div>
        <div class="btn">
        <button id="js-back-button">&#60;</button>
        <button id="js-next-button">&#62;</button>
      </div>
      </div>
      
    </div>

      <div class="results">
        <div>
          Wins: <span id="wins"></span> | Losses: <span id="losses"></span> | Ties <span id="ties"></span>
        </div>
        <div class="reset">
          <button id="js-reset-button">Reset Score</button>
          <button id="js-autoPlay-button">Auto Play</button>
      </div>
      </div>
    </div>
    <div class="link-container">
      <div class="link">
        <a href="index.html">Calculator</a>
      </div>
      <div class="link">
        <a href="todo-list.html">todo-list</a>
      </div>
    </div>

    <script src="scripts/rock-paper-scissors.js"></script>
  </body>
</html>
